name: Lunes Auto Login (Every 14 Days)

on:
  schedule:
    - cron: "0 2 */14 * *"  # 每14天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run login script
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
        run: |
          python login.py

      - name: 📸 Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op-screenshots
          path: |
            screenshots/*.png

      - name: ⏱️ Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
