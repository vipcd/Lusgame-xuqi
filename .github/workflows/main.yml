name: Lunes Auto Login (with Dynamic Proxy)

on:
  schedule:
    - cron: "5 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      # 🌟 核心修改：跨仓库稀疏检出，只从私库拉取这三个指定文件
      - uses: actions/checkout@v4
        with:
          repository: 'vipcd/zhuanshu-jiaoben' # 👈【必须修改】改成你真实的私库路径！例如 'jack/my-secret-bot'
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}    # 刚才在公开库配置的私库暗号
          sparse-checkout: |
            luneshost.py
            luneshost.txt
            luneshost-node.py
            luneshost-time.txt
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          python -m playwright install firefox --with-deps

      - name: Setup and Start Hysteria2 Proxy
        env:
          HY2_NODE: ${{ secrets.HY2_NODE }}
        run: |
          wget -qO hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          # 直接运行从私库里拉出来的解析脚本
          python parse_node.py
          ./hysteria client --config hy2_config.yaml > hysteria.log 2>&1 &
          sleep 5
          echo "Hysteria2 代理已成功在后台启动..."

      - name: Run keepalive
        env:
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run python login.py

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }} # 用私库 Token，把时间戳更新回私库，公开库保持绝对干净
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)

      # 无论成功失败，截图都会打包上传到当前工作流产物里
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-screenshots
          path: |
            login_success.png
            login_failed.png
          if-no-files-found: ignore
