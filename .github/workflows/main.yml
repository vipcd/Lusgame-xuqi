name: Lunes Auto Login (with Dynamic Proxy)

on:
  schedule:
    - cron: "5 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Setup and Start Hysteria2 Proxy
        env:
          HY2_NODE: ${{ secrets.HY2_NODE }}
        run: |
          # 1. 下载 Hysteria 官方 Linux 客户端
          wget -qO hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          
          # 2. 动态解析 Secret 中的 Hysteria2 节点链接并生成配置文件
          cat << 'EOF' > parse_node.py
import os
import urllib.parse

uri = os.getenv('HY2_NODE', '').strip()
if not uri:
    print("❌ 错误：GitHub Secrets 中没有找到 HY2_NODE 变量，请先前往仓库设置中添加！")
    exit(1)

if uri.startswith('hy2://'):
    uri = uri.replace('hy2://', 'hysteria2://', 1)

try:
    parsed = urllib.parse.urlparse(uri)
    server = parsed.netloc.split('@')[-1]
    auth = parsed.netloc.split('@')[0] if '@' in parsed.netloc else ''
    auth = urllib.parse.unquote(auth)
    
    queries = urllib.parse.parse_qs(parsed.query)
    sni = queries.get('sni', [''])[0]
    insecure = queries.get('insecure', ['0'])[0] in ['1', 'true', 'True'] or queries.get('allowInsecure', ['0'])[0] in ['1', 'true', 'True']
    pin = queries.get('pinSHA256', [''])[0]
    
    config = f"server: {server}\n"
    if auth:
        config += f"auth: {auth}\n"
    config += f"tls:\n  sni: {sni if sni else 'www.bing.com'}\n  insecure: {'true' if insecure else 'false'}\n"
    if pin:
        config += f"  pinSHA256: {pin}\n"
    config += "http:\n  listen: 127.0.0.1:1081\nsocks5:\n  listen: 127.0.0.1:1080\n"
    
    with open('hy2_config.yaml', 'w') as f:
        f.write(config)
    print('✅ 成功从加密变量 HY2_NODE 中解析并生成 hy2_config.yaml！')
except Exception as e:
    print(f'❌ 解析 Hysteria2 节点链接失败，请检查节点格式。错误: {e}')
    exit(1)
EOF
          
          python parse_node.py || exit 1
          
          # 3. 在后台静默启动 Hysteria 客户端
          ./hysteria client --config hy2_config.yaml > hysteria.log 2>&1 &
          
          # 4. 等待 5 秒钟让代理客户端完成握手连接
          sleep 5
          echo "Hysteria2 代理已成功在后台启动..."

      - name: Run keepalive
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
        run: python login.py

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)

      # 【新增诊断步骤】如果运行失败，自动打印 Hysteria2 代理日志，方便一眼看出节点是否有问题
      - name: Print Debug Logs on Failure
        if: failure()
        run: |
          echo "=================== Hysteria 运行日志 ==================="
          cat hysteria.log || echo "未找到 hysteria.log 日志文件"
          echo "========================================================"
