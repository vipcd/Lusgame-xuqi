name: Lunes Auto Login (with Proxy)

on:
  schedule:
    - cron: "05 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          playwright install chromium --with-deps

      - name: Setup and Start Hysteria2 Proxy
        run: |
          # 1. 下载 Hysteria 官方 Linux 客户端
          wget -qO hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          
          # 2. 根据你的节点信息，动态生成 Hysteria2 配置文件
          cat <<EOF > hy2_config.yaml
          server: 141.145.215.131:20009
          auth: be98810e-1fcf-4808-990f-b1f018d62e4b
          tls:
            sni: www.bing.com
            insecure: true
            pinSHA256: c5b4be0f5fff14de7f98f3a8114ad907883352072e42d06dc9b1c522975cf27c
          http:
            listen: 127.0.0.1:1081
          socks5:
            listen: 127.0.0.1:1080
          EOF
          
          # 3. 在后台静默启动 Hysteria 客户端，并将流量转为本地 1081 端口
          ./hysteria client --config hy2_config.yaml > hysteria.log 2>&1 &
          
          # 4. 等待 5 秒钟让代理客户端完成握手连接
          sleep 5
          printenv
          echo "Hysteria2 代理已在后台启动..."

      - name: Run keepalive
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
        run: python login.py

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)
