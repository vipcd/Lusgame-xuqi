name: Lunes Auto Login (with Dynamic Proxy)

on:
  schedule:
    - cron: "5 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    # 🌟 核心修复点：强制指定 22.04 稳定系统，避开 24.04 的老依赖缺失坑
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      # 1. 精准拉取改名后的私库文件
      - uses: actions/checkout@v4
        with:
          repository: 'vipcd/zhuanshu-jiaoben' # 👈 你的私库路径
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          sparse-checkout: |
            luneshost-node.py
            luneshost-time.txt
            luneshost.py
            luneshost.txt
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 2. 安装依赖，并精准安装火狐内核（firefox）
      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r luneshost.txt
          python -m playwright install firefox --with-deps

      # 3. 启动 Hysteria2 代理
      - name: Setup and Start Hysteria2 Proxy
        env:
          HY2_NODE: ${{ secrets.HY2_NODE }}
        run: |
          wget -qO hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          python luneshost-node.py || exit 1
          ./hysteria client --config hy2_config.yaml > hysteria.log 2>&1 &
          sleep 5
          echo "Hysteria2 代理已成功在后台启动..."

      # 4. 加上 xvfb-run，允许非无头模式正常跑起来
      - name: Run keepalive
        env:
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run python luneshost.py

      # 5. 将时间戳写入并追踪改名后的 luneshost-time.txt
      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > luneshost-time.txt
          git add --sparse luneshost-time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)

      # 6. 如果失败，打印代理日志
      - name: Print Debug Logs on Failure
        if: failure()
        run: |
          echo "=================== Hysteria 运行日志 ==================="
          cat hysteria.log || echo "未找到 hysteria.log 日志文件"
          echo "========================================================"

      # 7. 无论成功失败，统一上传打包截图
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-screenshots
          path: |
            login_success.png
            login_failed.png
          if-no-files-found: ignore
