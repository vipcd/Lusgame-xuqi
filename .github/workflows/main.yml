name: Lunes Auto Login (with Dynamic Proxy)

on:
  schedule:
    - cron: "5 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Setup and Start Hysteria2 Proxy
        env:
          HY2_NODE: ${{ secrets.HY2_NODE }}
        run: |
          wget -qO hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          python parse_node.py
          ./hysteria client --config hy2_config.yaml > hysteria.log 2>&1 &
          sleep 5
          echo "Hysteria2 代理已成功在后台启动..."

      - name: Run keepalive
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
        run: python login.py

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)

      # 🔴 核心改进：如果执行失败，把截取到的网页照片打包上传到 GitHub 页面上供下载
      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-login-failure-image
          path: login_failed.png
          if-no-files-found: ignore

      - name: Print Debug Logs on Failure
        if: failure()
        run: |
          echo "=================== Hysteria 运行日志 ==================="
          cat hysteria.log || echo "未找到 hysteria.log 日志文件"
          echo "========================================================"
