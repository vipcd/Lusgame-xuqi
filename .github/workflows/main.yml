name: Lunes Auto Login

on:
  schedule:
    - cron: "0 2 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup gost v3 proxy
        run: |
          wget -q "https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_linux_amd64.tar.gz" -O /tmp/gost.tar.gz
          tar xzf /tmp/gost.tar.gz -C /tmp
          chmod +x /tmp/gost
          # Start gost: local HTTP proxy -> upstream SOCKS5
          nohup /tmp/gost -L http://:8888 -F "${{ secrets.SOCKS5_PROXY }}" > /tmp/gost.log 2>&1 &
          sleep 5
          cat /tmp/gost.log
          # Test proxy works
          curl -s --proxy http://127.0.0.1:8888 --connect-timeout 15 https://httpbin.org/ip && echo "Proxy OK" || echo "Proxy FAILED"

      - name: Install deps
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run login
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
          PROXY_URL: http://127.0.0.1:8888
        run: python login.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)
